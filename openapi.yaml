openapi: 3.0.3
info:
  title: Camera Stream Integration with AI Vision Service
  description: |
    Đặc tả API ký kết hợp đồng giữa Camera Stream Service (Consumer) và AI Vision Service (Provider).
    Hệ thống sử dụng cơ chế Asynchronous (Fire-and-forget) để tối ưu băng thông cho Camera.
    Tất cả các request bắt buộc phải được xác thực qua Bearer Token.
  version: 1.0.0-stable
servers:
  - url: http://localhost:8000
    description: Môi trường Local / Docker Sandbox

security:
  - BearerAuth: []

paths:
  /api/v1/vision/analyze:
    post:
      summary: Camera Stream đẩy dữ liệu ảnh về AI Vision xử lý
      description: |
        Endpoint do AI Vision cung cấp. Camera Stream sẽ gửi image_url kèm các context (camera_id, timestamp, correlationId).
        AI Vision validate dữ liệu (ảnh ≤ 5MB) và phản hồi lập tức 202 Accepted để giải phóng luồng camera.
      operationId: analyzeCameraFrame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeRequest'
      responses:
        "202":
          description: Đã tiếp nhận thành công và đưa vào hàng đợi xử lý ngầm (Background Queue).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyzeResponseSuccess'
        "400":
          description: Dữ liệu đầu vào không hợp lệ hoặc kích thước ảnh vượt quá 5MB.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "401":
          description: Không có quyền truy cập (Thiếu hoặc sai Bearer Token).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        "500":
          description: Lỗi hệ thống phía AI Vision (Tràn bộ đệm / Treo tiến trình).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /health:
    get:
      summary: Kiểm tra trạng thái hoạt động của AI Vision Service
      description: Endpoint giám sát sức khỏe (Healthcheck) dành cho API Gateway / DevOps.
      security: [] # Endpoint công khai không cần token bảo mật
      responses:
        "200":
          description: Service hoạt động bình thường.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  service:
                    type: string
                    example: "ai-vision"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-05-22T09:00:00.000Z"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Nhập token xác thực phân quyền với Role `vision-analyzer`.

  schemas:
    AnalyzeRequest:
      type: object
      required:
        - camera_id
        - image_url
        - timestamp
        - correlationId
      properties:
        camera_id:
          type: string
          description: Mã định danh duy nhất của thiết thiết bị camera ghi hình.
          example: "cam-gate-01-entry"
        image_url:
          type: string
          format: uri
          description: Đường dẫn URL công khai hoặc nội bộ của bức ảnh cần phân tích (Giới hạn dung lượng tối đa 5MB).
          example: "https://ultralytics.com/images/bus.jpg"
        timestamp:
          type: string
          format: date-time
          description: Thời điểm ghi hình chính xác tại camera (Định dạng ISO 8601 UTC chuẩn).
          example: "2026-05-22T10:30:00Z"
        correlationId:
          type: string
          description: Chuỗi Id độc nhất (Unique Key) do Camera sinh ra dùng để chống trùng lặp request (Idempotency) và truy vết log xuyên suốt hệ thống.
          example: "corr-b2-b4-b6-9912a"

    AnalyzeResponseSuccess:
      type: object
      properties:
        status:
          type: string
          example: "received"
        message:
          type: string
          example: "Ảnh đã được đưa vào hàng đợi xử lý ngắm."

    ProblemDetails:
      type: object
      description: Cấu trúc chuẩn hóa lỗi theo tiêu chuẩn ngành RFC 7807 (Problem Details).
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
          description: URL tham chiếu đến tài liệu mô tả loại lỗi này.
          example: "https://api.smartcampus.edu.vn/errors/bad-request"
        title:
          type: string
          description: Tóm tắt ngắn gọn về loại lỗi.
          example: "Invalid Request Payload"
        status:
          type: integer
          description: HTTP status code trả về.
          example: 400
        detail:
          type: string
          description: Giải thích chi tiết nguyên nhân cụ thể dẫn đến lỗi.
          example: "The field 'image_url' is required and must be a valid URI. Image size must not exceed 5MB."
        instance:
          type: string
          format: uri
          description: URI cụ thể của request xảy ra lỗi.
          example: "/api/v1/vision/analyze"