openapi: 3.1.0

info:
  title: Camera Stream Service API
  version: 1.0.0
  description: API tiếp nhận và xử lý luồng camera cho Smart Campus.
  contact:
    name: FIT4110 Team 7
    email: team7@fit4110.local

servers:
  - url: http://localhost:4010
    description: Prism Mock Server

tags:
  - name: health
  - name: camera
  - name: vision

security:
  - bearerAuth: []

paths:

  /health:
    get:
      operationId: getHealthStatus
      tags: [health]
      summary: Health check
      description: Kiểm tra trạng thái hoạt động của service.
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /camera/connect:
    post:
      operationId: connectCamera
      tags: [camera]
      summary: Connect camera
      description: Kết nối camera IP vào hệ thống.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CameraConnectRequest'
      responses:
        '201':
          description: Camera connected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraStatus'
        '400':
          $ref: '#/components/responses/BadRequest'

  /camera/status/{cameraId}:
    get:
      operationId: getCameraStatus
      tags: [camera]
      summary: Get camera status
      description: Kiểm tra trạng thái hoạt động của camera.
      parameters:
        - name: cameraId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Camera status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CameraStatus'
        '404':
          $ref: '#/components/responses/NotFound'

  /camera/frame/{cameraId}:
    get:
      operationId: getCameraFrame
      tags: [camera]
      summary: Get current frame
      description: Lấy frame hiện tại từ camera.
      parameters:
        - name: cameraId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current frame
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameResponse'

  /vision/detect:
    post:
      operationId: detectObjects
      tags: [vision]
      summary: Detect objects
      description: Gửi frame sang AI Vision để nhận diện đối tượng.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionRequest'
      responses:
        '200':
          description: Detection result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResult'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok

    CameraConnectRequest:
      type: object
      required:
        - camera_id
        - rtsp_url
      properties:
        camera_id:
          type: string
        rtsp_url:
          type: string

    CameraStatus:
      type: object
      properties:
        camera_id:
          type: string
        status:
          type: string
          enum:
            - ONLINE
            - OFFLINE
        lastDetectedAt:
          type: [string, 'null']
          format: date-time

    FrameResponse:
      type: object
      properties:
        camera_id:
          type: string
        image_url:
          type: string

    DetectionRequest:
      type: object
      properties:
        camera_id:
          type: string
        image_url:
          type: string

    DetectionResult:
      oneOf:
        - $ref: '#/components/schemas/PersonDetection'
        - $ref: '#/components/schemas/VehicleDetection'

      discriminator:
        propertyName: objectType

    PersonDetection:
      type: object
      properties:
        objectType:
          type: string
          const: PERSON
        detection_id:
          type: string
        confidence:
          type: number

    VehicleDetection:
      type: object
      properties:
        objectType:
          type: string
          const: VEHICLE
        detection_id:
          type: string
        confidence:
          type: number

    Problem:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

  responses:

    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'